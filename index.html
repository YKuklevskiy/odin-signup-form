<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="background">
      <div>
        <div class="background-separator">
          <div id="logo-container">
            <img src="images/odin-lined.png" alt="LOGO" />
            <span>ODIN</span>
          </div>
        </div>
        <div class="background-separator"></div>
      </div>
      <div id="background-footer">
        Photo by
        <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on
        <a
          href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA"
          >Unsplash</a
        >
      </div>
    </div>
    <div id="main-container">
      <div id="form-header" class="bold">
        <p class="bottom-sep">
          This is not a real online service! You know you need something like
          this in your life to help you realize your deepest dreams. Sign up
          <em>now</em> to get started.
        </p>
        <p class="bottom-sep">You <em>know</em> you want to.</p>
      </div>
      <form id="main-form" action="#" method="get">
        <legend class="bottom-sep">Let's do this!</legend>
        <fieldset class="bottom-sep">
          <div>
            <label for="first_name">First Name</label>
            <input type="text" name="first_name" required />
          </div>
          <div>
            <label for="last_name">Last Name</label>
            <input type="text" name="last_name" required />
          </div>
        </fieldset>
        <fieldset class="bottom-sep">
          <div>
            <label for="email">Email</label>
            <input type="email" name="email" />
          </div>
          <div>
            <label for="phone">Phone number</label>
            <input type="tel" name="phone" />
          </div>
        </fieldset>
        <fieldset class="bottom-sep">
          <div>
            <label for="password" min>Password</label>
            <input type="password" name="password" required />
          </div>
          <div>
            <label for="password_confirm">Confirm password</label>
            <input type="password" name="password_confirm" required />
          </div>
        </fieldset>
      </form>
      <div id="form-footer">
        <button form="main-form" class="bottom-sep" type="submit">
          Create Account
        </button>
        <div class="bottom-sep">
          <span>Already have an account? </span><a href="#">Log in</a>
        </div>
      </div>
    </div>
  </body>
</html>
