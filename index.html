<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="background">
      <div id="logo-container">
        <img id="logo" src="/images/odin-lined.png" alt="" />
        <span>ODIN</span>
      </div>
      <div id="background-footer"></div>
    </div>
    <div id="main-container">
      <div id="form-header">
        <p>
          This is not a real online service! You know you need something like
          this in your life to help you realize your deepest dreams. Sign up
          <em>now</em> to get started.
        </p>
        <p>You <em>know</em> you want to.</p>
      </div>
      <form action="#" method="get"></form>
      <div id="form-footer">
        <button>Create Account</button>
        <div><span>Already have an account? </span><a href="#">Log in</a></div>
      </div>
    </div>
  </body>
</html>
